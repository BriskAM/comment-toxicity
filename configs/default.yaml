# Comment Toxicity Classification Configuration

data:
  train_csv: "data/train.csv"
  test_csv: "data/test.csv"
  sample_csv: "data/Sample.csv"

preprocessing:
  tfidf_word:
    ngram_range: [1, 2]
    min_df: 10
    max_df: 0.95
    max_features: 8000
    sublinear_tf: true

  tfidf_svd:
    ngram_range: [1, 2]
    min_df: 10
    max_df: 0.95
    max_features: 8000
    sublinear_tf: true
    n_components: 50

  tfidf_char:
    ngram_range: [3, 5]
    min_df: 20
    max_df: 0.95
    max_features: 5000
    sublinear_tf: true

  target_encoding:
    smoothing: 20.0
    n_folds: 5

models:
  lightgbm:
    n_estimators: 1200
    learning_rate: 0.03
    num_leaves: 127
    max_depth: -1
    min_child_samples: 50
    subsample: 0.8
    subsample_freq: 1
    colsample_bytree: 0.6
    reg_alpha: 0.05
    reg_lambda: 0.1
    early_stopping_rounds: 30

  logistic_regression:
    C: 4.0
    solver: "saga"
    max_iter: 200
    multi_class: "multinomial"

  random_forest:
    n_estimators: 15
    max_depth: 5
    max_features: "sqrt"
    min_samples_leaf: 10
    subsample_ratio: 0.3

  class_weight:
    0: 1.0
    1: 4.0
    2: 2.0
    3: 8.0

training:
  n_splits: 2
  random_seed: 42
  blend_optimizer: "Nelder-Mead"
  blend_maxiter: 500
  threshold_optimizer: "Nelder-Mead"
  threshold_maxiter: 500
  tune_subsample: 0.25

output:
  out_dir: "runs"
  model_name: "comment_toxicity"
  submission_name: "submission.csv"
